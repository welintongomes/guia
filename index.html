function buildNosEditor(nos) {
  if (!nos || nos.length === 0) {
    return `<div style="text-align:center;padding:24px;color:var(--chrome);font-family:var(--font-mono);font-size:11px;text-transform:uppercase;border:1px dashed rgba(255,255,255,0.1);border-radius:8px;">Nenhum bloco criado ainda. Clique em "NOVO BLOCO (NÓ)".</div>`;
  }

  const nosMap = new Map(nos.map(n => [n.id, n]));
  const visitados = new Set();
  const htmlFlatList = [];
  
  // Gerenciador do Sistema de Zoom/Foco
  let noInicialId = nos[0].id;
  let mostrandoSubarvore = false;
  if (window._fluxoFocoId && nosMap.has(window._fluxoFocoId)) {
      noInicialId = window._fluxoFocoId;
      mostrandoSubarvore = true;
  }

  // Desenha aviso de foco ativo se o usuário deu "zoom" em um ramo profundo
  let topoFocoHtml = '';
  if (mostrandoSubarvore) {
      const noFoco = nosMap.get(noInicialId);
      topoFocoHtml = `
      <div class="focus-badge-ativo">
         <span style="overflow:hidden;overflow: scroll;width: 60%; white-space:nowrap;">🔍 <b>VISÃO FOCADA:</b> Editando ramo de: <strong style="color:var(--yellow)">"${esc(noFoco.pergunta || noFoco.titulo)}"</strong></span>
         <button class="btn yellow sm" style="width:auto; padding:4px 8px; font-size:11px; margin-left:12px;" onclick="window.limparFocoFluxo()">VER TUDO</button>
      </div>`;
  }

  // Varredura sequencial profunda (DFS), mas jogando os blocos de forma plana (Full Width)
  function traverseFlatList(id, currentPath) {
    if (visitados.has(id)) {
      const noAlvo = nosMap.get(id);
      htmlFlatList.push(`
        <div style="background: rgba(34, 211, 238, 0.03); border: 1px dashed rgba(34, 211, 238, 0.3); padding: 10px; border-radius: var(--r); font-size: 12px; color: var(--cyan2); margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between;">
           <span>🔄 <b>RECONEXÃO DE ESCOPO:</b> As decisões acima direcionam o usuário de volta ao Bloco: <b>"${esc(noAlvo?.pergunta || noAlvo?.titulo)}"</b></span>
           <button class="step-mini-btn edit" onclick="window.scrollParaNo('${id}')">Subir para o Bloco ↑</button>
        </div>`);
      return;
    }

    const no = nosMap.get(id);
    if (!no) return;

    visitados.add(id);
    htmlFlatList.push(buildNoEditorCard(no, nos.indexOf(no), nos, currentPath));

    if (no.tipo !== 'diagnostico' && no.opcoes) {
      no.opcoes.forEach((op) => {
        if (op.destinoId && nosMap.has(op.destinoId)) {
          const nextPath = [...currentPath, { tipo: 'bloco', txt: no.pergunta || no.titulo }, { tipo: 'resp', txt: op.label }];
          traverseFlatList(op.destinoId, nextPath);
        }
      });
    }
  }

  // Inicializa o desenho do fluxo com largura total
  const raizNome = nosMap.get(noInicialId)?.pergunta || nosMap.get(noInicialId)?.titulo || 'Início';
  traverseFlatList(noInicialId, [{ tipo: 'bloco', txt: raizNome }]);

  // Captura blocos órfãos desconectados (Apenas se não estiver em modo focado)
  let isoladosHtml = '';
  if (!mostrandoSubarvore) {
    const htmlIsolados = [];
    nos.forEach((n) => {
      if (!visitados.has(n.id)) {
        function traverseIsolados(id, path) {
          if (visitados.has(id)) return;
          const node = nosMap.get(id);
          if (!node) return;
          visitados.add(id);
          htmlIsolados.push(buildNoEditorCard(node, nos.indexOf(node), nos, path));
          if (node.tipo !== 'diagnostico' && node.opcoes) {
            node.opcoes.forEach(op => {
              if (op.destinoId && nosMap.has(op.destinoId)) {
                traverseIsolados(op.destinoId, [...path, { tipo: 'bloco', txt: node.pergunta || node.titulo }, { tipo: 'resp', txt: op.label }]);
              }
            });
          }
        }
        traverseIsolados(n.id, [{ tipo: 'bloco', txt: n.pergunta || n.titulo || 'Bloco Avulso' }]);
      }
    });
    
    if (htmlIsolados.length > 0) {
      isoladosHtml = `
        <div style="margin-top:25px; border-top:2px dashed rgba(192,57,43,0.3); padding-top:15px;">
          <div class="label" style="color:#e74c3c; font-size:11px; margin-bottom:10px; letter-spacing:1px;">⚠️ BLOCOS AVULSOS / DESCONECTADOS (Mapeie um destino de resposta acima para conectá-los ao fluxo)</div>
          ${htmlIsolados.join('')}
        </div>`;
    }
  }

  return topoFocoHtml + `<div style="display:flex; flex-direction:column; gap:12px;">${htmlFlatList.join('')}</div>` + isoladosHtml;
}

// Auxiliar técnico para montar as tags de linhagem organizadas
function buildCaminhoBarHtml(path) {
    if (!path || path.length === 0) return '';
    const itensHtml = path.map((item) => {
        if (item.tipo === 'bloco') {
            return `<span class="fluxo-caminho-step">${esc((item.txt || '').slice(0, 12))}...</span>`;
        } else {
            return `<span class="fluxo-caminho-seta">➔</span><span class="fluxo-caminho-resp">${esc(item.txt)}</span>`;
        }
    }).join(' ');
    return `<div class="fluxo-caminho-bar">${itensHtml}</div>`;
}

// Função auxiliar mágica que monta a árvore visual aninhando filhos dentro de pais
function renderTraverseTree(noId, nosMap, visitados, nivel, todosNos) {
  // Evita Loops Infinitos na tela se o usuário apontar A para B e B para A
  if (visitados.has(noId)) {
    const no = nosMap.get(noId);
    return `<div style="margin-left:24px; padding:6px 12px; background:rgba(231,76,60,0.08); border:1px solid rgba(231,76,60,0.25); border-radius:var(--r); font-size:11px; color:#e74c3c; font-family:var(--font-mono); display:inline-block; margin-top:4px;">🔄 RETORNO DA DECISÃO: Redireciona o fluxo para o bloco existente: "${esc(no?.pergunta || no?.titulo)}"</div>`;
  }
  
  const no = nosMap.get(noId);
  if (!no) return '';
  
  visitados.add(noId);
  
  // Gera o bloco HTML atual
  let html = buildNoEditorCard(no, todosNos.indexOf(no), todosNos);
  
  // Se o bloco for uma pergunta e possuir opções de resposta, investiga se tem filhos para aninhar
  if (no.tipo !== 'diagnostico' && no.opcoes && no.opcoes.length > 0) {
    let filhosHtml = '';
    no.opcoes.forEach((op, oi) => {
      if (op.destinoId && nosMap.has(op.destinoId)) {
        filhosHtml += `
          <div class="tree-branch">
            <div class="branch-label">↳ Se a resposta for: <strong>"${esc(op.label)}"</strong></div>
            ${renderTraverseTree(op.destinoId, nosMap, visitados, nivel + 1, todosNos)}
          </div>`;
      } else if (op.destino === 'diagnostico_direto') {
        filhosHtml += `
          <div class="tree-branch">
            <div class="branch-label" style="color:var(--green2)">↳ Se a resposta for: <strong style="background:rgba(46,204,113,0.15); border-color:rgba(46,204,113,0.3); color:var(--green2)">"${esc(op.label)}"</strong> ➔ Conclui e encerra o fluxo</div>
          </div>`;
      }
    });
    html += filhosHtml;
  }
  
  return `<div class="tree-node-group" id="group_${noId}">${html}</div>`;
}

// Cole este validador estrutural exatamente ANTES de window.salvarFluxoComNos
window.validarEstruturaDoFluxo = (nos, noRaizId) => {
  const erros = [];
  const visitados = new Set();
  const pilhaRec = new Set();
  const nosMap = new Map(nos.map(n => [n.id, n]));

  if (!noRaizId || !nosMap.has(noRaizId)) {
    return ["O fluxo não possui um bloco inicial válido."];
  }

  function verificarNo(id) {
    if (pilhaRec.has(id)) {
      const no = nosMap.get(id);
      erros.push(`🔄 Loop Infinito detectado no bloco: "${no?.pergunta || no?.titulo}"`);
      return;
    }
    if (visitados.has(id)) return;

    visitados.add(id);
    pilhaRec.add(id);

    const no = nosMap.get(id);
    if (no && no.tipo !== 'diagnostico' && no.opcoes) {
      no.opcoes.forEach(op => {
        if (!op.destinoId && op.destino !== 'diagnostico_direto') {
          erros.push(`🔀 A opção "${op.label}" do bloco "${no.pergunta}" está sem destino mapeado.`);
        } else if (op.destinoId && !nosMap.has(op.destinoId)) {
          erros.push(`❌ O destino da opção "${op.label}" aponta para um bloco inexistente.`);
        } else if (op.destinoId) {
          verificarNo(op.destinoId);
        }
      });
    }
    pilhaRec.delete(id);
  }

  verificarNo(noRaizId);

  nos.forEach(n => {
    if (!visitados.has(n.id)) {
      erros.push(`👻 Bloco Isolado: O bloco "${n.pergunta || n.titulo}" não possui caminhos que cheguem até ele.`);
    }
  });

  return erros;
};
window.salvarFluxoComNos = async () => {
  const nome=v('fNome');if(!nome){toast('⚠ Digite o nome do fluxo!','');return;}
  
  // 1. Sincroniza a única caixa que está aberta no momento para a memória
  window.sincronizarDOMParaMemoria(); 
  const errosFluxo = window.validarEstruturaDoFluxo(window._nosEditor, window._nosEditor[0]?.id);
  if (errosFluxo.length > 0) {
    if (!confirm("⚠️ Falhas estruturais detectadas no fluxo:\n\n" + errosFluxo.join("\n") + "\n\nDeseja salvar o diagrama mesmo assim?")) {
      return; // Interrompe o salvamento para o usuário corrigir
    }
  }
  const nosColetados = [];
  
  // 2. Lê os dados 100% da Memória (ignorando se a tela está aberta ou fechada)
  for(const no of window._nosEditor) {
    let titulo = no.pergunta || no.titulo || (no.tipo === 'diagnostico' ? 'Diagnóstico' : 'Pergunta');
    
    if(no.tipo === 'diagnostico'){
      await salvarNaBiblioteca({
        titulo, 
        descricao: no.descricao || '', 
        codigo: no.codigo || '', 
        categoria:'Diagnóstico',
        fotos: no.fotos || [], 
        audio: no.audio || null, 
        alerta:'', 
        origem:'Fluxo', 
        origemId:'fluxo_diag_'+no.id,
        importadoDaBib: no.importadoDaBib // 👈 TRAVA ADICIONADA AQUI!
      });
      
      nosColetados.push({
        id: no.id, tipo: 'diagnostico', titulo, pergunta: titulo, descricao: no.descricao || '',
        solucao: no.solucao || '', procId: no.procId || null, procValor: no.procValor || 0, fotos: no.fotos || [], audio: no.audio || null, codigo: no.codigo || ''
      });
    } else {
      const opcoes = [];
      for(let oi=0; oi<(no.opcoes||[]).length; oi++){
        const opt = no.opcoes[oi];
        // Recupera o destino sem perder nada! (Removido o salvamento inútil de opções na biblioteca)
        if(opt.label) {
          opcoes.push({label: opt.label, destinoId: opt.destinoId || null, destino: opt.destino || ''});
        }
      }
      
      // ── DEPOIS ──
      await salvarNaBiblioteca({
        titulo,
        descricao : no.descricao || '',   
        codigo    : no.codigo    || '',
        categoria : 'Pergunta de Fluxo',
        fotos     : no.fotos  || [],
        audio     : no.audio  || null,
        alerta    : no.alerta || '',       
        origem    : 'Fluxo',
        origemId  : 'fluxo_q_' + no.id,
        importadoDaBib: no.importadoDaBib // 👈 TRAVA ADICIONADA AQUI!
      });

      nosColetados.push({
        id        : no.id,
        tipo      : 'pergunta',
        pergunta  : titulo,
        titulo,
        descricao : no.descricao || '',   
        alerta    : no.alerta    || '',   
        opcoes,
        procId    : no.procId    || null,
        procValor : no.procValor || 0,
        fotos     : no.fotos  || [],
        audio     : no.audio  || null,
        codigo    : no.codigo || ''
      });
    }
  }

  // 3. Finaliza o salvamento no Banco de Dados
  S.biblioteca = await DB.getAll('biblioteca');
  const f=S.editandoFluxo||{criadoEm:Date.now()};
  f.nome=nome; f.descricao=v('fDesc'); f.categoria=v('fCat');
  f.nos=nosColetados; f.noRaizId=nosColetados[0]?.id||null; f.atualizadoEm=Date.now();
  
  const novoId = await DB.put('fluxos',f);
  if(!f.id) f.id = novoId; 

  const fluxosAtualizados = await DB.getAll('fluxos');
  S.fluxos = fluxosAtualizados;
  
  fecharModal(); S.viewFluxoId=f.id; toast('✅ Fluxo salvo sem perder conexões!','cyan'); S.editandoFluxo=null;
  document.getElementById('body').innerHTML=buildVerFluxo(f); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
};

window.filtrarBibModal = (busca, tipo, refId) => {
  const resId = tipo === 'proc' ? 'bibResults_proc' : 'bibResults_' + refId;
  const res = document.getElementById(resId);
  if(!res) return;
  if(!busca || busca.length < 2) { res.innerHTML = ''; return; }

  const q = busca.toLowerCase().trim();
  const itens = S.biblioteca.filter(b => (b.titulo||'').toLowerCase().includes(q)).slice(0, 5);

  if(itens.length === 0) { res.innerHTML = '<div style="font-size:12px;color:var(--chrome);padding:4px 0;">Nenhum encontrado.</div>'; return; }

  res.innerHTML = itens.map(b => {
    // Se tiver foto, cria a miniatura
    const thumb = b.fotos && b.fotos.length ? `<img src="${b.fotos[0]}" style="width:28px;height:28px;object-fit:cover;border-radius:4px;flex-shrink:0;border:1px solid rgba(255,255,255,.1)">` : `<div style="width:28px;height:28px;background:rgba(0,0,0,.2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;opacity:.5">📄</div>`;
    
    return `<div style="padding:6px 8px;background:var(--steel3);margin-top:4px;border-radius:4px;cursor:pointer;font-size:12px;border-left:3px solid ${tipo==='proc'?'var(--yellow)':'var(--cyan2)'};display:flex;align-items:center;gap:8px" onclick="usarBib('${b.id}', '${tipo}', '${refId||''}')">
      ${thumb}
      <div style="display:flex;flex-direction:column;overflow:hidden"><span style="color:var(--chrome2);white-space:nowrap;text-overflow:ellipsis;overflow:hidden">${esc(b.titulo)}</span><span style="font-size:9px;color:var(--chrome);margin-top:1px">${esc(b.categoria||'Geral')}</span></div>
    </div>`;
  }).join('');
};

window.usarBib = (id, tipo, refId) => {
  const item = S.biblioteca.find(b => b.id === parseInt(id));
  if(!item) return;

  if(tipo === 'proc') {
    const tEl=document.getElementById('sTitulo');if(tEl)tEl.value=item.titulo||'';
    const dEl=document.getElementById('sDesc');if(dEl)dEl.value=item.descricao||'';
    const aEl=document.getElementById('sAlerta');if(aEl)aEl.value=item.alerta||'';
    const cEl=document.getElementById('sCodigo');if(cEl)cEl.value=item.codigo||'';
    
    if(item.fotos?.length){ window._stepFotosTemp=[...item.fotos]; renderFotosPreviews(); }
    if(item.audio){ window._stepAudioTemp = item.audio; renderAudioPreview('step'); }
    // 👇 trava para nao duplicar itens na biblioteca 👇
    window._stepImportadoDaBib = true;
    document.getElementById('bibResults_proc').innerHTML = ''; 
    document.querySelector('#bibResults_proc').previousElementSibling.value = ''; 
    toast('✅ Importado!', 'orange');
    
  } else if(tipo === 'fluxo') {
    window.sincronizarDOMParaMemoria();
    const no = window._nosEditor.find(n => n.id === refId);
    
    if(no) { 
        no.pergunta  = item.titulo   || no.pergunta;
        no.titulo    = item.titulo   || no.titulo;
        no.descricao = item.descricao || '';
        no.solucao   = item.descricao || '';
        no.codigo    = item.codigo   || '';
        no.alerta    = item.alerta   || '';

        if (item.fotos && item.fotos.length > 0) no.fotos = [...item.fotos];
        if (item.audio) no.audio = item.audio;
        // 👇 mostra se o item foi importado ou não 👇
        no.importadoDaBib = true;
    }

    document.getElementById('nosEditorContainer').innerHTML = buildNosEditor(window._nosEditor, null);

    const resEl = document.getElementById('bibResults_' + refId);
    if (resEl) {
        resEl.innerHTML = '';
        const inputBusca = resEl.previousElementSibling;
        if (inputBusca) inputBusca.value = '';
    }

    toast('✅ Tudo importado: título, descrição, código, alerta, fotos e áudio!', 'cyan');
    
  } else if(tipo === 'fluxo_opt') {
    // 🧠 MÁGICA DO DIÁLOGO RPG: Transforma o item da biblioteca em um bloco rico e o conecta!
    window.sincronizarDOMParaMemoria();
    
    // O refId aqui vem no formato "noId_opcaoIdx" (ex: n170023_0)
    const underscoreIndex = refId.lastIndexOf('_');
    const noId = refId.substring(0, underscoreIndex);
    const oi = parseInt(refId.substring(underscoreIndex + 1));
    
    const noOrigem = window._nosEditor.find(n => n.id === noId);
    if(!noOrigem || !noOrigem.opcoes[oi]) return;

    // 1. Gera o novo Bloco Rico (A próxima fala/reação com todo o pacote multimídia)
    const novoId = 'n' + Date.now() + Math.random().toString(36).substring(2,5);
    const novoNo = {
        id: novoId,
        tipo: 'pergunta', // Mantém como "pergunta" para o fluxo nunca parar
        pergunta: item.titulo,
        titulo: item.titulo,
        descricao: item.descricao || '',
        codigo: item.codigo || '',
        fotos: item.fotos ? [...item.fotos] : [],
        audio: item.audio || null,
        alerta: item.alerta || '',
        opcoes: []
    };
    
    window._nosEditor.push(novoNo);
    window._noAbertoId = novoId; // Expande o novo bloco automaticamente para focar nele
    
    // 2. A "Ponte": Conecta a opção de resposta do usuário a este novo bloco
    noOrigem.opcoes[oi].destinoId = novoId;
    noOrigem.opcoes[oi].destino = '';
    
    // Se o usuário deixou o campo de texto da opção vazio, ele puxa o nome do item para não bugar
    if (!noOrigem.opcoes[oi].label || noOrigem.opcoes[oi].label.trim() === '') {
        noOrigem.opcoes[oi].label = item.titulo;
    }

    // 3. Atualiza a tela gráfica do construtor
    document.getElementById('nosEditorContainer').innerHTML = buildNosEditor(window._nosEditor, null);
    
    // Animação de rolagem suave até a continuação da conversa
    toast('📚 Diálogo RPG gerado e conectado com sucesso!', 'cyan');
    setTimeout(() => {
        const novoEl = document.getElementById('noeditor_' + novoId);
        if(novoEl) {
            novoEl.scrollIntoView({behavior: 'smooth', block: 'center'});
            novoEl.style.boxShadow = '0 0 20px var(--cyan2)';
            setTimeout(() => novoEl.style.transition = 'box-shadow 1s', 100);
            setTimeout(() => novoEl.style.boxShadow = 'none', 1500);
        }
    }, 100);
  }
};

window.executarExport = async () => {
  if(!_exportSelecionados.size && !_exportFluxosSel.size && !_exportBibCompleta && !_exportHistoricoCompleto){
    toast('⚠ Selecione pelo menos um item para fazer backup!',''); return;
  }
  
  // Limpa os IDs locais para não dar conflito
  const procs = S.procedimentos.filter(p=>_exportSelecionados.has(p.id)).map(p=>{const{id,...rest}=p;return{...rest,_exportId:id};});
  const fluxos = S.fluxos.filter(f=>_exportFluxosSel.has(f.id)).map(f=>{const{id,...rest}=f;return{...rest,_exportId:id};});
  const bib = _exportBibCompleta ? S.biblioteca.map(b=>{const{id,...rest}=b;return{...rest,_exportId:id};}) : [];
  
  // Se o botão de histórico estiver ligado, salva todo o progresso do jogador
  const hist = _exportHistoricoCompleto ? (S.historico || []) : [];


  // Salva também o cofre de mídias!
  const midiasExp = await DB.getAll('midias');
  
  const json = JSON.stringify({
    guiaPro: true, 
    versao: '3.0', 
    exportadoEm: Date.now(),
    procedimentos: procs,
    fluxos: fluxos,
    biblioteca: bib,
    historico: hist, // 👻 O FANTASMA AGORA VIAJA JUNTO NO ARQUIVO!
    midias: midiasExp // 📦 O COFRE VIAJA JUNTO NO ARQUIVO!
  });
  
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Guia_Backup_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  toast(`✅ Backup concluído e baixado!`, 'ok');
  fecharModal();
};

window.importarArquivo = async e => {
  const file = e.target.files?.[0];
  if(!file) return;
  e.target.value = ''; // Reseta o input file
  
  const loading = document.getElementById('loading');
  if(loading) loading.style.display = 'flex';
  
  try {
    const txt = await file.text();
    const dados = JSON.parse(txt);
    
    if(!dados.guiaPro){
      toast('❌ O arquivo selecionado não é um backup do GuiaPro!', 'error');
      if(loading) loading.style.display = 'none';
      return;
    }

    let importProc = 0, importFluxo = 0, importBib = 0, importHist = 0, importMidias = 0;

    // 0. IMPORTAR COFRE DE MÍDIAS PRIMEIRO (FASE 2)
    if(dados.midias && Array.isArray(dados.midias)){
        for(const m of dados.midias){
            // Usa o _putOriginal para gravar direto na tabela de mídias
            await DB._putOriginal('midias', m);
            importMidias++;
        }
    }

    // 1. IMPORTAR BIBLIOTECA
    
    if(dados.biblioteca && Array.isArray(dados.biblioteca)){
        for(const b of dados.biblioteca){
           const id = await salvarNaBiblioteca(b); 
           if(id) importBib++;
        }
    }

    // 2. IMPORTAR PROCEDIMENTOS
    if(dados.procedimentos && Array.isArray(dados.procedimentos)){
        for(const p of dados.procedimentos){
          const{_exportId,...proc}=p;
          const nomeExiste = S.procedimentos.some(x=>x.nome===proc.nome);
          if(nomeExiste) proc.nome = proc.nome + ' (Cópia)';
          proc.criadoEm = proc.criadoEm || Date.now();
          proc.atualizadoEm = Date.now();
          
          const id = await DB.put('procedimentos', proc);
          proc.id = id;
          S.procedimentos.push(proc);
          importProc++;
          
          for(const s of proc.steps||[]){
             await salvarNaBiblioteca({titulo:s.titulo, descricao:s.descricao||'', categoria:proc.categoria||'', fotos:s.fotos||[], alerta:s.alerta||'', origem:'Procedimento', origemId:proc.id+':'+s.id});
          }
        }
    }

    // 3. IMPORTAR FLUXOS
    if(dados.fluxos && Array.isArray(dados.fluxos)){
        for(const f of dados.fluxos){
          const{_exportId,...fluxo}=f;
          const nomeExiste = S.fluxos.some(x=>x.nome===fluxo.nome);
          if(nomeExiste) fluxo.nome = fluxo.nome + ' (Cópia)';
          fluxo.criadoEm = fluxo.criadoEm || Date.now();
          fluxo.atualizadoEm = Date.now();
          
          const id = await DB.put('fluxos', fluxo);
          fluxo.id = id;
          S.fluxos.push(fluxo);
          importFluxo++;
        }
    }

    // 👻 4. IMPORTAR HISTÓRICO DE RECORDES
    if(dados.historico && Array.isArray(dados.historico)){
        for(const h of dados.historico){
          // Verifica se este recorde exato já existe para evitar duplicar
          const jaExiste = S.historico.some(x => x.id === h.id);
          if(!jaExiste){
            await DB.put('historico', h);
            S.historico.push(h);
            importHist++;
          }
        }
    }

    S.biblioteca = await DB.getAll('biblioteca');
    fecharModal();
    if(loading) loading.style.display = 'none';
    
    toast(`✅ RESTAURADO: ${importProc} Procs, ${importFluxo} Fluxos e ${importHist} Recordes!`, 'ok');
    
    // Se o usuário já estiver na tela de histórico, atualiza a lista ao vivo
    if (S.tab === 'historico' && typeof buildHistorico === 'function') {
       buildHistorico();
    } else {
       render();
    }
    
  } catch(err) {
    console.error(err);
    if(loading) loading.style.display = 'none';
    toast('❌ Erro ao ler arquivo! Pode estar corrompido.', 'error');
  }
};

window.sincronizarDOMParaMemoria = () => {

    if(tEl) { no.pergunta = tEl.value; no.titulo = tEl.value; }

    const dEl = document.getElementById('no_desc_'+no.id);
    if(dEl) {

      if(no.tipo === 'diagnostico') no.solucao = dEl.value;
    }

    const pEl = document.getElementById('no_proc_'+no.id);
    if(pEl) no.procId = pEl.value ? parseInt(pEl.value) : null;
    
    const vEl = document.getElementById('no_val_'+no.id);
    if(vEl) no.procValor = parseFloat(vEl.value) || 0;

    if(no.tipo !== 'diagnostico') {
      (no.opcoes || []).forEach((o, oi) => {
        const lEl = document.getElementById(`opt_label_${no.id}_${oi}`);
        if(lEl) o.label = lEl.value;
        const destEl = document.getElementById(`opt_dest_${no.id}_${oi}`);

          o.destino   = destEl.value === 'diagnostico_direto' ? 'diagnostico_direto' : '';

    }
  });
};

window.encontrarOrigemDoNo = (noId, todosNos) => {
    if (todosNos.length > 0 && todosNos[0].id === noId) return { tipo: 'raiz' }; // É o primeiro de todos
    
    // Procura em todos os nós se alguma opção aponta pra este ID
    for (let i = 0; i < todosNos.length; i++) {
        const pai = todosNos[i];
        if (pai.opcoes) {
            const opIdx = pai.opcoes.findIndex(o => o.destinoId === noId);
            if (opIdx !== -1) {
                const letra = String.fromCharCode(65 + opIdx);
                return { 
                    tipo: 'filho', 
                    paiNum: i + 1, 
                    paiTitulo: pai.pergunta || pai.titulo, 
                    respostaLetra: letra, 
                    respostaTexto: pai.opcoes[opIdx].label 
                };
            }
        }
    }
    return { tipo: 'orfao' }; // Ninguém aponta pra ele!
};

    }
    
    lb.innerHTML=`<img src="${safeSrc}" alt="Foto">`;

}

window.adicionarAudioTemp = (e, alvo, id) => {
  const file = e.target.files?.[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    if(alvo === 'step') { window._stepAudioTemp = reader.result; renderAudioPreview('step'); }
    if(alvo === 'bib') { window._bibAudioTemp = reader.result; renderAudioPreview('bib'); }
    if(alvo === 'fluxo') { 
        window.sincronizarDOMParaMemoria();
        const no = window._nosEditor.find(n => n.id === id);
        if(no) no.audio = reader.result;
        document.getElementById('nosEditorContainer').innerHTML = buildNosEditor(window._nosEditor, null);
    }
  };
  reader.readAsDataURL(file); // Converte o áudio para texto longo e salva no IndexedDB!
  e.target.value = '';
};

  if(alvo === 'step') { window._stepAudioTemp = null; renderAudioPreview('step'); }

/* ══ GRAVADOR NATIVO DE VOZ (PC e Celular) ══ */
window._mediaRecorder = null;
window._audioChunks = [];

window.toggleGravacaoNativa = async (alvo, id) => {
  const btnId = alvo === 'fluxo' ? 'btnGravar_' + id : 'btnGravar_' + alvo;
  const btn = document.getElementById(btnId);

  // SE JÁ ESTIVER GRAVANDO, ELE PARA E SALVA
  if (window._mediaRecorder && window._mediaRecorder.state === 'recording') {
    window._mediaRecorder.stop();
    if(btn) {
      btn.innerHTML = '<div style="font-size:22px;opacity:.6">🎙</div>';
      btn.classList.remove('gravando-ativo');
    }
    return;
  }

  // SE NÃO ESTIVER GRAVANDO, ELE PEDE O MICROFONE E COMEÇA
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    window._mediaRecorder = new MediaRecorder(stream);
    window._audioChunks = [];

    window._mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) window._audioChunks.push(e.data);
    };

    window._mediaRecorder.onstop = () => {
      // Quando parar, converte a gravação para o formato Base64 do banco de dados
      const blob = new Blob(window._audioChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onload = () => {
        if(alvo === 'step') { window._stepAudioTemp = reader.result; renderAudioPreview('step'); }
        if(alvo === 'bib') { window._bibAudioTemp = reader.result; renderAudioPreview('bib'); }
        if(alvo === 'fluxo') { 
            window.sincronizarDOMParaMemoria();
            const no = window._nosEditor.find(n => n.id === id);
            if(no) no.audio = reader.result;
            document.getElementById('nosEditorContainer').innerHTML = buildNosEditor(window._nosEditor, null);
        }
      };
      reader.readAsDataURL(blob);
      // Desliga a luz vermelha do microfone do PC
      stream.getTracks().forEach(track => track.stop());
    };

    window._mediaRecorder.start();

/* ═════════════════════════════════════════════════════════════════
   🎙️ MOTOR DE VOZ EXTENSÍVEL COM TEXT-TO-SPEECH (GUIA PRO VOX)

// 🔊 Auxiliares globais de controlo de áudio e leitura
window._audioUtteranceAtual = null;
window._sistemaFalando = false;
/* ═════════════════════════════════════════════════════════════════
   🔊 DETECTOR DE IDIOMA OFFLINE E LEITURA DINÂMICA (TTS)
   ═════════════════════════════════════════════════════════════════ */
/* ═════════════════════════════════════════════════════════════════
   🔊 MOTOR DE IDIOMAS ATUALIZADO (LIMPEZA VISUAL E TEXT-TO-SPEECH)
   ═════════════════════════════════════════════════════════════════ */

// 1. 🖼️ FUNÇÃO DE LIMPEZA VISUAL: Remove completamente os marcadores "~xx" da tela
window.limparTagsTexto = (texto) => {
  if (!texto) return "";
  // Remove globalmente qualquer tag do tipo ~pt, ~en, ~es (seguidas ou não de espaços)
  return texto.replace(/~[a-zA-Z]{2}\s*/g, '');
};

window.detectarIdiomaDoTexto = (texto) => {
  if (!texto) return 'pt-BR';
  const t = texto.toLowerCase();

  // 1. Prioridade Máxima: Marcadores Manuais
  if (t.includes('~en')) return 'en-US';
  if (t.includes('~es')) return 'es-ES';
  if (t.includes('~pt')) return 'pt-BR';

  // 2. Dicionários de Palavras (Expandidos com vocabulário base)
  const padraoIngles = /\b(the|is|are|do|does|yes|no|not|you|i|am|we|they|sell|milk|can|with|and|have|good|morning|afternoon|please|hello|thanks|thank|what|where|how|why|who|bread|loaf|tomorrow|my|your|this|that|it)\b/g;
  const padraoEspanhol = /\b(el|los|las|un|una|y|en|con|hola|gracias|adios|buenos|buenas|pero|muy|donde|cuando|quien|usted|ustedes|ellos|pan|lo|al|si)\b/g;
  const padraoPortugues = /\b(o|a|os|as|um|uma|e|em|com|bom|dia|tarde|noite|obrigado|obrigada|você|do|da|dos|das|no|na|nos|nas|não|sim|pão|eu|meu|minha|aqui|para)\b/g;

  // 3. Contagem de Pontos
  const ptsIngles = (t.match(padraoIngles) || []).length;
  const ptsEspanhol = (t.match(padraoEspanhol) || []).length;
  const ptsPortugues = (t.match(padraoPortugues) || []).length;

  // Se não encontrou nenhuma palavra, o padrão é Português
  if (ptsIngles === 0 && ptsEspanhol === 0 && ptsPortugues === 0) return 'pt-BR';

  // 4. Regra de Desempate (O Segredo para evitar a confusão com a palavra "do" ou "no")
  if (ptsIngles === ptsPortugues && ptsIngles > 0) {
    // Se empatou, a probabilidade de ser uma frase em inglês usando palavras curtas ambíguas é altíssima.
    return 'en-US'; 
  }

  // 5. Verificação de Vencedor
  if (ptsIngles > ptsEspanhol && ptsIngles > ptsPortugues) return 'en-US';
  if (ptsEspanhol > ptsIngles && ptsEspanhol > ptsPortugues) return 'es-ES';

  // Retorno de segurança
  return 'pt-BR';
};
// 3. 🔊 LEITOR DE VOZ DINÂMICO: Obedece cada comando por linha, altera o sotaque e ignora os marcadores
window.falarTextoGuiaPro = (camposArray) => {
  window.speechSynthesis.cancel(); // Para qualquer leitura anterior
  
  if (window._reconhecedorAtivo) {
    window._sistemaFalando = true; 
    window._reconhecedorAtivo.stop();
  } else {
    window._sistemaFalando = true;
  }

  const fragmentosLinhas = [];
  camposArray.forEach(bloco => {
    if (!bloco) return;
    const linhas = bloco.split(/\n/); 
    linhas.forEach(linha => {
      const linhaLimpa = linha.replace(/[\u2714\u2715]|PASSO CONCLUÍDO|Abandonar/g, '').trim(); 
      if (linhaLimpa.length > 0) {
        fragmentosLinhas.push(linhaLimpa);
      }
    });
  });

  if (fragmentosLinhas.length === 0) {
    window._sistemaFalando = false;
    return;
  }

  fragmentosLinhas.forEach((frase, index) => {
    const idiomaDetectado = window.detectarIdiomaDoTexto(frase);
    
    // Remove categoricamente a tag de idioma da frase antes de falar para nunca ler "til pt"
    const fraseFormatada = frase.replace(/~[a-zA-Z]{2}\s*/g, '').trim();

    if (fraseFormatada.length === 0) return;

    const utterance = new SpeechSynthesisUtterance(fraseFormatada);
    utterance.lang = idiomaDetectado;
    utterance.rate = idiomaDetectado === 'pt-BR' ? 1.15 : 0.88; 

    if (window.speechSynthesis.getVoices) {
      const vozesDisponiveis = window.speechSynthesis.getVoices();
      const vozIdeal = vozesDisponiveis.find(v => v.lang.startsWith(idiomaDetectado));
      if (vozIdeal) utterance.voice = vozIdeal;
    }

    if (index === fragmentosLinhas.length - 1) {
      utterance.onend = () => {
        window._sistemaFalando = false;
        setTimeout(() => {
          if (window._reconhecedorAtivo && window.speechSynthesis.speaking === false) {
            try {
              window._ultimoStartVoz = Date.now();
              window._reconhecedorAtivo.start();
            } catch(e) {}
          }
        }, 800);
      };
    }

    window.speechSynthesis.speak(utterance);
  });
};

/* ═════════════════════════════════════════════════════════════════

/* 🎙️ ATIVADOR E GERENCIADOR DO RECONHECIMENTO DE VOZ */
/* 🎙️ GERENCIADOR DE RECONHECIMENTO DE VOZ COM TRAVA OPERACIONAL ANTI-BIPE */
window.ativarComandosVozOperacionais = () => {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    toast("🎙️ Comando de voz não suportado neste dispositivo.", "error");
    return;
  }

  if (window._reconhecedorAtivo) {
    window._reconhecedorAtivo.stop();
    window._reconhecedorAtivo = null;
    window.speechSynthesis.cancel();
    window._sistemaFalando = false;
    clearTimeout(window._timerEstabilizadorVozMobile);
    toast("🎙️ Microfone Desativado", "error");
    document.getElementById("btnVozGlobal")?.classList.remove("ativo");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = false; 
  recognition.interimResults = false;

  recognition.onresult = (event) => {
    const resultado = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
    console.log("🎙️ Capturado no celular:", resultado);

    let comandoExecutado = false;

    for (const chave in window.registroComandosVoz) {
      if (resultado === chave || resultado.includes(chave)) {
        window.registroComandosVoz[chave]();
        comandoExecutado = true;
        break;
      }
    }

    if (!comandoExecutado && S.fluxoExec) {
      const fluxo = S.fluxos.find(f => f.id === S.fluxoExec.fluxoId);
      const noAtual = fluxo?.nos?.find(n => n.id === S.fluxoExec.noAtual);
      
      if (noAtual && noAtual.opcoes) {
        const indexEncontrado = noAtual.opcoes.findIndex(op => {
          const textoBotao = op.label.toLowerCase().trim();
          return resultado === textoBotao || resultado.includes(textoBotao) || textoBotao.includes(resultado);
        });

        if (indexEncontrado !== -1) {
          window.speechSynthesis.cancel();
          A.fluxoResponder(indexEncontrado);
          toast(`🎙️ Selecionado: "${noAtual.opcoes[indexEncontrado].label}"`, "ok");
        }
      }
    }
  };

  recognition.onend = () => {
    // 🔥 BLOQUEIO DO LAÇO: Se o celular está lendo o texto, impede o reinício e corta os bipes!
    if (window._sistemaFalando) {
      console.log("🎙️ Reinício suspenso enquanto o áudio está tocando.");
      return; 
    }

    if (window._reconhecedorAtivo) {
      clearTimeout(window._timerEstabilizadorVozMobile);
      
      const agora = Date.now();
      const tempoDesdeUltimoStart = agora - window._ultimoStartVoz;
      
      let tempoEspera = 1200; 
      if (tempoDesdeUltimoStart < 3000) {
        tempoEspera = 3000; // Proteção para o hardware do celular respirar
      }

      window._timerEstabilizadorVozMobile = setTimeout(() => {
        // Nova validação antes de disparar o hardware de captura
        if (window._reconhecedorAtivo && !window._sistemaFalando) {
          try {
            window._ultimoStartVoz = Date.now();
            recognition.start();
          } catch (e) {
            console.log("Aguardando liberação do microfone...");
          }
        }
      }, tempoEspera);
    }
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech') return; // Ignora silêncio
    if (event.error === 'aborted') return;   // Ignora fechamentos manuais controlados
    console.error("Erro capturado:", event.error);
  };

  window._reconhecedorAtivo = recognition;
  
  try {
    window._sistemaFalando = false;
    window._ultimoStartVoz = Date.now();
    recognition.start();
    document.getElementById("btnVozGlobal")?.classList.add("ativo");
    toast("🎙️ Voz Inteligente Estabilizada!", "ok");
  } catch(e) {
    console.log("Erro de inicialização:", e);
  }
};

/* ═════════════════════════════════════════════════════════════════
   🔊 MOTOR DE VOZ COM MEMÓRIA DE PALAVRA (RESUMO CIRÚRGICO)
   ═════════════════════════════════════════════════════════════════ */

// Variáveis de controle da nossa Fila Customizada e Memória
window._filaDeFalas = [];
window._fraseAtual = null; // Guarda um objeto com texto e idioma
window._charIndexAtual = 0; // Guarda a posição global na frase
window._charIndexParcial = 0; // Guarda a posição da palavra sendo lida no momento
window._leituraPausada = false;
window._sistemaFalando = false;

// 1. INICIA A FILA E LIMPA AS TAGS
window.falarTextoGuiaPro = (camposArray) => {
  window.speechSynthesis.cancel();
  window._filaDeFalas = [];
  window._fraseAtual = null;
  window._charIndexAtual = 0;
  window._charIndexParcial = 0;
  window._leituraPausada = false;

  if (window._reconhecedorAtivo) {
    window._sistemaFalando = true; 
    window._reconhecedorAtivo.stop();
  } else {
    window._sistemaFalando = true;
  }

  // Prepara as linhas, detecta o idioma original e limpa as tags ANTES de colocar na fila
  camposArray.forEach(bloco => {
    if (!bloco) return;
    const linhas = bloco.split(/\n/); 
    linhas.forEach(linha => {
      const linhaLimpa = linha.replace(/[\u2714\u2715]|PASSO CONCLUÍDO|Abandonar/g, '').trim(); 
      if (linhaLimpa.length > 0) {
        
        // Detecta o idioma lendo a tag (~en, ~pt) ou por palavras-chave
        const idiomaDetectado = window.detectarIdiomaDoTexto(linhaLimpa);
        
        // Remove a tag visualmente para o leitor não ler "til e n"
        const textoFormatado = linhaLimpa.replace(/~[a-zA-Z]{2}\s*/g, '').trim();
        
        if (textoFormatado.length > 0) {
          window._filaDeFalas.push({ texto: textoFormatado, idioma: idiomaDetectado });
        }
      }
    });
  });

  if (window._filaDeFalas.length === 0) {
    window._sistemaFalando = false;
    return;
  }

  window.tocarProximaFala();
};

// 2. TOCA A PRÓXIMA FRASE (OU RETOMA EXATAMENTE DA PALAVRA PAUSADA)
window.tocarProximaFala = () => {
  if (window._leituraPausada) return;
  
  if (window._filaDeFalas.length === 0 && !window._fraseAtual) {
    window._sistemaFalando = false;
    // Respiro para reativar o microfone de comandos de voz
    setTimeout(() => {
      if (window._reconhecedorAtivo && window.speechSynthesis.speaking === false) {
        try {
          window._ultimoStartVoz = Date.now();
          window._reconhecedorAtivo.start();
        } catch(e) {}
      }
    }, 800);
    return;
  }

  // Puxa a frase salva na memória ou a próxima da fila
  const item = window._fraseAtual || window._filaDeFalas.shift();
  window._fraseAtual = item;

  // CORTA O TEXTO: Se o usuário pausou antes, ele inicia a partir da palavra onde parou!
  const textoParaLer = item.texto.substring(window._charIndexAtual).trim();

  // Se já leu a linha toda, zera os contadores e chama a próxima
  if (!textoParaLer) {
    window._fraseAtual = null;
    window._charIndexAtual = 0;
    window.tocarProximaFala();
    return;
  }

  const utterance = new SpeechSynthesisUtterance(textoParaLer);
  utterance.lang = item.idioma;
  utterance.rate = item.idioma === 'pt-BR' ? 1.15 : 0.88; 

  if (window.speechSynthesis.getVoices) {
    const vozesDisponiveis = window.speechSynthesis.getVoices();
    const vozIdeal = vozesDisponiveis.find(v => v.lang.startsWith(item.idioma));
    if (vozIdeal) utterance.voice = vozIdeal;
  }

  window._charIndexParcial = 0;

  // 🧠 MÁGICA AQUI: O evento "onboundary" rastreia a posição de cada palavra que está sendo dita
  utterance.onboundary = (e) => {
    if (e.name === 'word') {
      window._charIndexParcial = e.charIndex;
    }
  };

  // Se finalizou com sucesso ou foi interrompido, salvamos a posição da palavra
  utterance.onend = () => {
    if (window._leituraPausada) {
      window._charIndexAtual += window._charIndexParcial;
      return;
    }
    // Se não está pausado, leu até o fim. Limpa para a próxima linha.
    window._fraseAtual = null;
    window._charIndexAtual = 0;
    window.tocarProximaFala();
  };

  utterance.onerror = (e) => {
    // Blindagem de Erros: Independente do tipo de erro do Android, se clicou em pause, salva a posição!
    if (window._leituraPausada) {
      window._charIndexAtual += window._charIndexParcial;
      return;
    }
    // Se foi um erro aleatório sem ser pause, tenta pular para não travar
    window._fraseAtual = null;
    window._charIndexAtual = 0;
    window.tocarProximaFala();
  };

  window.speechSynthesis.speak(utterance);
};

// 3. CONTROLES DOS BOTÕES E COMANDOS (PLAY / PAUSE SIMULADO)
window.acionarLeituraTela = () => {
  if (window._sistemaFalando) {
    if (window._leituraPausada) {
      window._leituraPausada = false;
      window.tocarProximaFala();
      toast("▶ Retomando Leitura...", "ok");
    } else {
      window._leituraPausada = true;
      window.speechSynthesis.cancel(); 
      toast("⏸ Leitura em Pausa", "ok");
    }
  } else {
    window._leituraPausada = false;
    const campos = window.coletarCamposEtapaAtualArray();
    if (campos && campos.length > 0) {
      window.falarTextoGuiaPro(campos);
      toast("🔊 Lendo informações da tela...", "ok");
    } else {
      toast("⚠ Nada para ler nesta etapa.", "error");
    }
  }
};

window.pararLeituraTela = () => {
  window._filaDeFalas = [];
  window._fraseAtual = null;
  window._charIndexAtual = 0;
  window._charIndexParcial = 0;
  window._leituraPausada = false;
  window._sistemaFalando = false;
  window.speechSynthesis.cancel();
  toast("⏹ Leitura Parada", "error");
};
/* ═════════════════════════════════════════════════════════════════
   🤖 LEITURA SOB DEMANDA (CLIQUE) E PILOTO AUTOMÁTICO
   ═════════════════════════════════════════════════════════════════ */

// Puxa da memória se o usuário deixou o Piloto Automático ligado na última vez
window._leituraAutomatica = lsGet('leituraAuto', false);

// 1. Alterna a Chave Seletora (Liga/Desliga o Automático)
window.toggleLeituraAuto = () => {
  window._leituraAutomatica = !window._leituraAutomatica;
  localStorage.setItem('mp_leituraAuto', JSON.stringify(window._leituraAutomatica));
  toast(window._leituraAutomatica ? "🤖 Piloto Automático LIGADO" : "🔇 Piloto Automático DESLIGADO", window._leituraAutomatica ? "ok" : "error");
  render(); // Atualiza a tela para pintar o botão
};

// 2. Leitura Direta pelo Clique
window.lerTextoDireto = (texto) => {
  if (!texto) return;
  if (event) event.stopPropagation(); // Impede de clicar em botões que estejam atrás do texto
  
  window.pararLeituraTela(); // Para e zera qualquer áudio que esteja rolando
  window.falarTextoGuiaPro([texto]); // Envia apenas a frase clicada para o leitor
  toast("🔊 Lendo trecho selecionado...", "ok");
};
/* ═════════════════════════════════════════════════════════════════
   🔄 TRANSIÇÃO SEGURA DE TELA (Mata áudio velho e religa sensores)
   ═════════════════════════════════════════════════════════════════ */
window.navegarComAudio = (deveLerNovaTela) => {
  // 1. Mata silenciosamente o áudio da tela velha sem disparar Toast
  window._filaDeFalas = [];
  window._fraseAtual = null;
  window._charIndexAtual = 0;
  window._charIndexParcial = 0;
  window._leituraPausada = false;
  window._sistemaFalando = false;
  window.speechSynthesis.cancel();
  
  // 2. Aguarda a tela nova terminar de desenhar
  setTimeout(() => {
    if (window._leituraAutomatica && deveLerNovaTela) {
      // Se o AUTO estiver ON, lê a tela nova forçadamente (sem passar pelo botão de Play/Pause)
      const campos = window.coletarCamposEtapaAtualArray();
      if (campos && campos.length > 0) {
        window.falarTextoGuiaPro(campos);
      }
    } else {
      // Se o AUTO estiver OFF, devolve o controle imediatamente para o microfone
      if (window._reconhecedorAtivo && !window.speechSynthesis.speaking) {
        try {
          window._ultimoStartVoz = Date.now();
          window._reconhecedorAtivo.start();
        } catch(e) {}
      }
    }
  }, 400);
};

/* ═════════════════════════════════════════════════════════════════
   🛡️ SENSOR DE TELA BLOQUEADA / MINIMIZADA (Resolve o falso piscar)
   ═════════════════════════════════════════════════════════════════ */
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    // Se o usuário bloqueou a tela ou trocou de app
    if (window._reconhecedorAtivo) {
      window._erroCriticoVoz = true; // Trava o nosso loop de estabilização
      window._reconhecedorAtivo.stop();
      window._reconhecedorAtivo = null;
      
      // Remove o efeito piscante visualmente na mesma hora
      document.getElementById("btnVozGlobal")?.classList.remove("ativo");
      
      console.log("Tela bloqueada: Microfone desligado por segurança.");
    }
  }
});
/* ═════════════════════════════════════════════════════════════════
   🙈 MÁSCARA DE TEXTO OCULTO (MODO ESTUDO / FLASHCARD)
   ═════════════════════════════════════════════════════════════════ */
window.renderizarTextoOculto = (texto, limite = 0) => {
  if (!texto) return '';
  
  // Se o texto tiver a tag ~oc, intercepta e devolve uma tarja visual elegante
  if (texto.includes('~oc')) {
    return '<span style="color:var(--chrome); background:rgba(0,0,0,0.3); padding:2px 8px; border-radius:4px; font-size:0.9em; border:1px dashed rgba(255,255,255,0.1);">🤫 [ CONTEÚDO OCULTO ]</span>';
  }
  
  // Se não for oculto, limpa as tags normais (~en, ~pt) e aplica o limite de caracteres se houver
  let textoLimpo = esc(window.limparTagsTexto(texto));
  if (limite > 0 && textoLimpo.length > limite) {
    return textoLimpo.slice(0, limite) + '…';
  }
  
  return textoLimpo;
};
/* ═════════════════════════════════════════════════════════════════
   ⏱️ MOTOR DE SPEEDRUN (SPLITS E CRONÔMETRO)
   ═════════════════════════════════════════════════════════════════ */
window._modoSpeedrun = false;
window._srTimer = null;
window._srInicioTotal = 0;
window._srInicioPasso = 0;

window.toggleSpeedrun = () => {
  window._modoSpeedrun = !window._modoSpeedrun;
  if (window._modoSpeedrun) {
    window._srInicioTotal = Date.now();
    window._srInicioPasso = Date.now();
    // Atualiza a tela a cada 80ms para os milissegundos girarem de forma bem fluida!
    window._srTimer = setInterval(window.atualizarTimersSpeedrun, 80); 
    toast("🏃 MODO SPEEDRUN ATIVADO!", "ok");
  } else {
    clearInterval(window._srTimer);
    toast("🛑 Modo Speedrun Desativado", "error");
  }
  render(); // Força a tela a se redesenhar com o painel novo
};

window.atualizarTimersSpeedrun = () => {
  if (!window._modoSpeedrun || !S.execAtiva) return;
  const elTotal = document.getElementById('sr_total');
  const elPasso = document.getElementById('sr_passo');
  const elDelta = document.getElementById('sr_delta'); 
  
  const agora = Date.now();
  const tempoTotal = agora - window._srInicioTotal;
  const tempoPasso = agora - window._srInicioPasso;

  if (elTotal) elTotal.innerText = window.formatarTempoMs(tempoTotal);
  if (elPasso) elPasso.innerText = window.formatarTempoMs(tempoPasso);

  // 👻 PAINEL COMPARADOR DO FANTASMA (REAL-TIME DELTA SPLITS)
  if (elDelta && S.execAtiva.pbTempos && S.execAtiva.pbTempos.passos) {
    const tempoFantasma = S.execAtiva.pbTempos.passos[S.execAtiva.stepAtual] || 0;
    
    if (tempoFantasma > 0) {
      const diferenca = tempoPasso - tempoFantasma;
      
      if (diferenca > 0) {
        // PIOR: Mostra seta para cima (▲) em vermelho indicando tempo adicionado
        elDelta.innerHTML = `<span style="color:#e74c3c; background:rgba(231,76,60,0.12); padding:3px 8px; border-radius:4px; font-size:12px; font-weight:bold; letter-spacing:0.5px;">▲ +${window.formatarTempoMs(diferenca)}</span>`;
      } else {
        // MELHOR: Mostra seta para baixo (▼) em verde indicando tempo economizado
        elDelta.innerHTML = `<span style="color:var(--green2); background:rgba(46,204,113,0.12); padding:3px 8px; border-radius:4px; font-size:12px; font-weight:bold; letter-spacing:0.5px;">▼ -${window.formatarTempoMs(Math.abs(diferenca))}</span>`;
      }
    } else {
      // Caso seja um passo novo adicionado depois que não possua recorde
      elDelta.innerHTML = `<span style="color:var(--chrome); font-size:11px; font-style:italic;">🆕 Sem split</span>`;
    }
  }
};

window.formatarTempoMs = (ms) => {
  const minutos = Math.floor(ms / 60000);
  const segundos = Math.floor((ms % 60000) / 1000);
  const decis = Math.floor((ms % 1000) / 100); // Decisegundos (1 dígito)
  return `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}.${decis}`;
};
/* ══ INIT ══ */
(async()=>{
  try{
    await DB.open();
    [S.procedimentos,S.fluxos,S.biblioteca,S.historico]=await Promise.all([
        DB.getAll('procedimentos'),
        DB.getAll('fluxos'),
        DB.getAll('biblioteca'),
        DB.getAll('historico').catch(()=>[]) 
    ]);
    // Migrar steps existentes para biblioteca
    for(const proc of S.procedimentos){for(const step of proc.steps||[]){const existe=S.biblioteca.find(b=>b.origemId===proc.id+':'+step.id);if(!existe){await salvarNaBiblioteca({titulo:step.titulo,descricao:step.descricao||'',categoria:proc.categoria||'',fotos:step.fotos||[],alerta:step.alerta||'',origem:'Procedimento',origemId:proc.id+':'+step.id});}}}
    S.biblioteca=await DB.getAll('biblioteca');
  }catch(e){console.warn('DB:',e);S.procedimentos=lsGet('procs',[]);S.fluxos=[];S.biblioteca=[];}
  // Inicializar _nosEditor vazio
  window._nosEditor=[];
  await new Promise(r=>setTimeout(r,1100));
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
})();
</script>
